<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>College Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #667eea;
            margin-bottom: 24px;
            font-size: 0.9em;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.85em;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.85em;
        }

        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 1em;
            transition: transform 0.2s;
        }

        .role-btn:hover {
            transform: translateY(-2px);
        }

        .role-btn.dept-admin { background: #dc3545; }
        .role-btn.staff { background: #28a745; }
        .role-btn.student { background: #007bff; }

        .login-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 0.85em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            width: 100%;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .add-dept-btn, .add-staff-btn {
            display: block;
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            width: 100%;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .add-dept-btn:hover, .add-staff-btn:hover {
            background: #138496;
            transform: translateY(-2px);
        }

        .add-staff-btn {
            background: #fd7e14;
        }

        .add-staff-btn:hover {
            background: #e67e22;
        }

        .change-password-btn {
            display: block;
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            width: 100%;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.85em;
        }

        .change-password-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .modal-buttons .save {
            background: #28a745;
            color: white;
        }

        .modal-buttons .cancel {
            background: #6c757d;
            color: white;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .role-btn {
                padding: 10px;
                font-size: 0.85em;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 College Attendance System</h1>
        <div class="subtitle">Multi-Department Attendance Management</div>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div class="success-message">
            {{ success }}
        </div>
        {% endif %}
        
        <!-- Change Admin Password Button -->
        <button class="change-password-btn" onclick="showChangeAdminPasswordModal()">🔐 Change Admin Password</button>
        
        <!-- Add Department Button -->
        <button onclick="checkPasswordAndRedirect('add_department')" class="add-dept-btn">+ Add New Department</button>
        
        <!-- Add Staff Button -->
        <button onclick="checkPasswordAndRedirect('add_staff')" class="add-staff-btn">+ Add New Staff</button>
        
        <div class="role-buttons">
            <button onclick="showLogin('dept_admin')" class="role-btn dept-admin">Department Admin</button>
            <button onclick="showLogin('staff')" class="role-btn staff">Staff</button>
            <button onclick="showLogin('student')" class="role-btn student">Student</button>
        </div>

        <!-- Department Admin Login -->
        <div id="deptAdminLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Department Admin Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="dept_admin">
                <div class="form-group">
                    <label>Department:</label>
                    <select name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Admin Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>

        <!-- Staff Login -->
        <div id="staffLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Staff Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="staff">
                <div class="form-group">
                    <label>Department:</label>
                    <select name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year:</label>
                        <select name="year" required>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Section:</label>
                        <select name="section" required>
                            <option value="">Select Section</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Subject:</label>
                        <input type="text" name="subject" placeholder="e.g., Python" required>
                    </div>
                    <div class="form-group">
                        <label>Period:</label>
                        <select name="period" required>
                            <option value="1">Period 1</option>
                            <option value="2">Period 2</option>
                            <option value="3">Period 3</option>
                            <option value="4">Period 4</option>
                            <option value="5">Period 5</option>
                            <option value="6">Period 6</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>

        <!-- Student Login -->
        <div id="studentLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Student Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="student">
                <div class="form-group">
                    <label>Department:</label>
                    <select name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Register Number:</label>
                    <input type="text" name="register_number" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year:</label>
                        <select name="year" required>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Section:</label>
                        <select name="section" required>
                            <option value="">Select Section</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>
    </div>

    <!-- Change Admin Password Modal -->
    <div id="adminPasswordModal" class="modal">
        <div class="modal-content">
            <h3>Change Admin Password</h3>
            <input type="password" id="currentAdminPassword" placeholder="Current Admin Password">
            <input type="password" id="newAdminPassword" placeholder="New Password (min 6 characters)">
            <input type="password" id="confirmAdminPassword" placeholder="Confirm New Password">
            <div class="modal-buttons">
                <button class="save" onclick="changeAdminPassword()">Save</button>
                <button class="cancel" onclick="closeAdminPasswordModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let ADMIN_PASSWORD = 'admin123'; // Current admin password

        function showChangeAdminPasswordModal() {
            document.getElementById('currentAdminPassword').value = '';
            document.getElementById('newAdminPassword').value = '';
            document.getElementById('confirmAdminPassword').value = '';
            document.getElementById('adminPasswordModal').style.display = 'block';
        }

        function closeAdminPasswordModal() {
            document.getElementById('adminPasswordModal').style.display = 'none';
        }

        function changeAdminPassword() {
            const currentPassword = document.getElementById('currentAdminPassword').value;
            const newPassword = document.getElementById('newAdminPassword').value;
            const confirmPassword = document.getElementById('confirmAdminPassword').value;

            if (currentPassword !== ADMIN_PASSWORD) {
                alert('Current password is incorrect!');
                return;
            }

            if (!newPassword) {
                alert('Please enter a new password');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            // Update the password
            ADMIN_PASSWORD = newPassword;
            
            // Also update on the server
            fetch('/change_admin_password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    current_password: currentPassword,
                    new_password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Admin password changed successfully!');
                    closeAdminPasswordModal();
                    // Update the local variable
                    ADMIN_PASSWORD = newPassword;
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to change password');
            });
        }

        function checkPasswordAndRedirect(type) {
            const enteredPassword = prompt('Enter admin password to continue:');
            
            if (enteredPassword === null) {
                return;
            }
            
            if (enteredPassword === ADMIN_PASSWORD) {
                if (type === 'add_department') {
                    window.location.href = "{{ url_for('add_new_department_page') }}";
                } else if (type === 'add_staff') {
                    window.location.href = "{{ url_for('add_new_staff_page') }}";
                }
            } else {
                alert('Invalid password! Access denied.');
            }
        }
        
        function showLogin(role) {
            hideAll();
            if (role === 'dept_admin') {
                document.getElementById('deptAdminLogin').style.display = 'block';
            } else if (role === 'staff') {
                document.getElementById('staffLogin').style.display = 'block';
            } else if (role === 'student') {
                document.getElementById('studentLogin').style.display = 'block';
            }
        }

        function hideAll() {
            document.getElementById('deptAdminLogin').style.display = 'none';
            document.getElementById('staffLogin').style.display = 'none';
            document.getElementById('studentLogin').style.display = 'none';
        }

        // Dynamic section loading based on department and year
        document.querySelectorAll('select[name="department_id"]').forEach(select => {
            select.addEventListener('change', function() {
                const departmentId = this.value;
                const form = this.closest('form');
                const yearSelect = form.querySelector('select[name="year"]');
                const sectionSelect = form.querySelector('select[name="section"]');
                
                if (departmentId && yearSelect && yearSelect.value) {
                    fetch(`/get_sections/${departmentId}/${yearSelect.value}`)
                        .then(response => response.json())
                        .then(data => {
                            sectionSelect.innerHTML = '<option value="">Select Section</option>';
                            data.sections.forEach(section => {
                                sectionSelect.innerHTML += `<option value="${section}">${section}</option>`;
                            });
                        });
                }
            });
        });

        document.querySelectorAll('select[name="year"]').forEach(select => {
            select.addEventListener('change', function() {
                const form = this.closest('form');
                const departmentSelect = form.querySelector('select[name="department_id"]');
                const departmentId = departmentSelect ? departmentSelect.value : null;
                const sectionSelect = form.querySelector('select[name="section"]');
                
                if (departmentId && this.value) {
                    fetch(`/get_sections/${departmentId}/${this.value}`)
                        .then(response => response.json())
                        .then(data => {
                            sectionSelect.innerHTML = '<option value="">Select Section</option>';
                            data.sections.forEach(section => {
                                sectionSelect.innerHTML += `<option value="${section}">${section}</option>`;
                            });
                        });
                }
            });
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('adminPasswordModal');
            if (event.target == modal) {
                closeAdminPasswordModal();
            }
        }
    </script>
</body>
</html>
