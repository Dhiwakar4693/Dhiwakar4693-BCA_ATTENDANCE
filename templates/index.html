<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BCA Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 24px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #667eea;
            margin-bottom: 24px;
            font-size: 0.9em;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.85em;
        }

        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 1em;
            transition: transform 0.2s;
        }

        .role-btn:hover {
            transform: translateY(-2px);
        }

        .role-btn.admin { background: #dc3545; }
        .role-btn.staff { background: #28a745; }
        .role-btn.student { background: #007bff; }

        .login-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 0.85em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            width: 100%;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .role-btn {
                padding: 10px;
                font-size: 0.85em;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 BCA Attendance System</h1>
        <div class="subtitle">Department of Computer Applications</div>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <div class="role-buttons">
            <button onclick="showLogin('admin')" class="role-btn admin">Admin</button>
            <button onclick="showLogin('staff')" class="role-btn staff">Staff</button>
            <button onclick="showLogin('student')" class="role-btn student">Student</button>
        </div>

        <div id="adminLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Admin Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="admin">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>

        <div id="staffLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Staff Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="staff">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year:</label>
                        <select name="year" required>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Section:</label>
                        <select name="section" required>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Subject:</label>
                        <input type="text" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label>Period:</label>
                        <select name="period" required>
                            <option value="1">Period 1 (3 pts)</option>
                            <option value="2">Period 2 (0.75 pts)</option>
                            <option value="3">Period 3 (0.75 pts)</option>
                            <option value="4">Period 4 (3 pts)</option>
                            <option value="5">Period 5 (0.75 pts)</option>
                            <option value="6">Period 6 (0.75 pts)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>

        <div id="studentLogin" class="login-form">
            <h3 style="text-align: center; margin-bottom: 16px;">Student Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="student">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Register No:</label>
                    <input type="text" name="register_number" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year:</label>
                        <select name="year" required>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Section:</label>
                        <select name="section" required>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" onclick="hideAll()" class="btn btn-secondary">Back</button>
            </form>
        </div>
    </div>

    <script>
        function showLogin(role) {
            hideAll();
            document.getElementById(role + 'Login').style.display = 'block';
        }
        function hideAll() {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('staffLogin').style.display = 'none';
            document.getElementById('studentLogin').style.display = 'none';
        }
    </script>
</body>
</html>
