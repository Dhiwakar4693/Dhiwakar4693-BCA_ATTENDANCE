<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Staff Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1400px;
            margin: 0 auto;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h2 { font-size: 1.3em; }
        .subjects-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            display: inline-block;
            margin-top: 5px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .class-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            margin: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .class-info h3 { font-size: 1.1em; }
        .class-info p { font-size: 0.85em; opacity: 0.9; margin-top: 5px; }
        .student-info-btn {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .student-info-btn:hover {
            background: #138496;
            transform: translateY(-2px);
        }
        .period-info, .date-info {
            background: #e8f4f8;
            padding: 12px 20px;
            margin: 0 20px 15px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }
        .date-info { background: #f8f9fa; color: #333; }
        .stats-summary {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 0 20px 20px 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }
        .stat-box .number { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .bulk-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 0 20px 20px 20px;
            flex-wrap: wrap;
        }
        .bulk-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            min-width: 120px;
        }
        .bulk-present { background: #28a745; color: white; }
        .bulk-absent { background: #dc3545; color: white; }
        .table-wrapper {
            overflow-x: auto;
            margin: 0 20px 20px 20px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 500px;
        }
        th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            font-size: 0.8em;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        .attendance-cell { text-align: center; min-width: 250px; }
        .attendance-btn {
            padding: 8px 15px;
            margin: 0 3px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            transition: all 0.2s;
        }
        .btn-present { background: #28a745; color: white; }
        .btn-absent { background: #dc3545; color: white; }
        .btn-od { background: #17a2b8; color: white; }
        .btn-active { opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-inactive { opacity: 0.5; }
        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            flex: 1;
        }
        .btn-save { background: #28a745; color: white; }
        .btn-exit { background: #6c757d; color: white; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: modalFadeIn 0.3s;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 { font-size: 1.3em; }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0 10px;
        }
        .close-modal:hover { opacity: 0.8; }
        .modal-body { padding: 20px; }
        .student-profile-modal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .student-profile-modal h3 { margin-bottom: 10px; }
        .info-grid-modal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .info-card-modal {
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 10px;
        }
        .info-card-modal .label {
            font-size: 0.65em;
            opacity: 0.8;
            text-transform: uppercase;
        }
        .info-card-modal .value {
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 3px;
        }
        .attendance-table-modal {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.75em;
        }
        .attendance-table-modal th {
            background: #667eea;
            color: white;
            padding: 8px;
            text-align: center;
        }
        .attendance-table-modal td {
            padding: 6px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .present-badge-modal {
            background: #28a745;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7em;
        }
        .absent-badge-modal {
            background: #dc3545;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7em;
        }
        .od-badge-modal {
            background: #17a2b8;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7em;
        }
        .stats-modal {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .stat-modal {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-modal .number { font-size: 1.3em; font-weight: bold; color: #667eea; }
        .loading-modal { text-align: center; padding: 40px; color: #666; }
        
        .activity-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #17a2b8;
            color: white;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        @media (max-width: 768px) {
            .attendance-btn { padding: 5px 8px; font-size: 0.7em; }
            .button-group { flex-direction: column; }
            .info-grid-modal { grid-template-columns: 1fr; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>👨‍🏫 <span id="staffName">Loading...</span></h2>
                <div class="subjects-badge">📚 <span id="staffSubjects">Loading...</span></div>
            </div>
            <a href="#" class="logout-btn" id="logoutBtn">🚪 Logout</a>
        </div>

        <div class="class-info">
            <div>
                <h3><span id="yearSection">Loading...</span></h3>
                <p><span id="deptName">Loading...</span> | Total: <span id="totalStudents">0</span> Students</p>
            </div>
            <button class="student-info-btn" id="studentInfoBtn">📋 View All Student Info</button>
        </div>

        <div class="period-info">📊 Period <span id="periodValue">-</span></div>
        <div class="date-info">📅 <span id="dateValue">-</span></div>

        <div class="stats-summary">
            <div class="stat-box"><div class="number" id="totalCount">0</div><div>Total</div></div>
            <div class="stat-box"><div class="number" id="presentCount">0</div><div>Present</div></div>
            <div class="stat-box"><div class="number" id="absentCount">0</div><div>Absent</div></div>
        </div>

        <div class="bulk-actions">
            <button class="bulk-btn bulk-present" id="bulkPresentBtn">✅ All Present</button>
            <button class="bulk-btn bulk-absent" id="bulkAbsentBtn">❌ All Absent</button>
        </div>

        <div class="table-wrapper">
            <div id="loadingMessage" class="loading">Loading students...</div>
            <table id="attendanceTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Reg No</th>
                        <th>Student Name</th>
                        <th>Attendance</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                </tbody>
            </table>
        </div>

        <div class="button-group">
            <button id="saveBtn" class="btn btn-save">💾 Save & Exit</button>
            <button id="discardBtn" class="btn btn-exit">🗑️ Discard & Exit</button>
        </div>
    </div>

    <!-- Student Info Modal -->
    <div id="studentInfoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Student Information</h2>
                <button class="close-modal" onclick="closeStudentInfoModal()">&times;</button>
            </div>
            <div class="modal-body" id="studentInfoBody">
                <div class="loading-modal">Loading student information...</div>
            </div>
        </div>
    </div>

    <!-- OD Modal -->
    <div id="odModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎯 Select OD Activity</h3>
                <button class="close-modal" onclick="closeODModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="odActivityList"></div>
                <button id="closeModalBtn" style="margin-top:15px; padding:10px; width:100%; background:#6c757d; color:white; border:none; border-radius:8px;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        var currentPeriod = null;
        var currentDate = null;
        var studentsData = [];
        var activityTypesData = [];
        var attendanceDict = {};
        var hasChanges = false;
        var selectedStudentId = null;
        var selectedRegNo = null;
        var selectedPeriod = null;
        var isSaving = false;
        
        // Track OD marked per student per period
        var odMarkedPerPeriod = {};
        
        // Load initial data from server
        function loadInitialData() {
            var loadingMsg = document.getElementById('loadingMessage');
            var table = document.getElementById('attendanceTable');
            
            fetch('/get_staff_dashboard_data')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        currentPeriod = data.period;
                        currentDate = data.today;
                        studentsData = data.students;
                        activityTypesData = data.activity_types;
                        attendanceDict = data.attendance_dict || {};
                        
                        document.getElementById('staffName').innerText = data.staff_name;
                        document.getElementById('staffSubjects').innerText = data.staff_subjects.join(', ');
                        document.getElementById('yearSection').innerText = data.year + ' - Section ' + data.section;
                        document.getElementById('deptName').innerText = data.department_name;
                        document.getElementById('totalStudents').innerText = studentsData.length;
                        document.getElementById('periodValue').innerText = currentPeriod;
                        document.getElementById('dateValue').innerText = currentDate;
                        document.getElementById('totalCount').innerText = studentsData.length;
                        
                        loadingMsg.style.display = 'none';
                        table.style.display = 'table';
                        
                        renderStudentsTable();
                        renderActivityTypes();
                        updateStats();
                    } else {
                        loadingMsg.innerText = 'Error loading data: ' + data.error;
                    }
                })
                .catch(function(error) {
                    console.error('Error loading data:', error);
                    loadingMsg.innerText = 'Failed to load data. Please refresh the page.';
                });
        }
        
        // Render students table (without individual info buttons)
        function renderStudentsTable() {
            var tbody = document.getElementById('studentsTableBody');
            tbody.innerHTML = '';
            
            for (var i = 0; i < studentsData.length; i++) {
                var student = studentsData[i];
                var studentId = student.id;
                var regNo = student.register_number;
                var name = student.name;
                var periodStr = currentPeriod.toString();
                var currentStatus = null;
                
                if (attendanceDict[studentId] && attendanceDict[studentId][periodStr]) {
                    currentStatus = attendanceDict[studentId][periodStr];
                }
                
                var row = tbody.insertRow();
                row.id = 'row-' + studentId;
                
                var cell1 = row.insertCell(0);
                cell1.textContent = regNo;
                
                var cell2 = row.insertCell(1);
                cell2.textContent = name;  // Removed the info button
                
                var cell3 = row.insertCell(2);
                cell3.className = 'attendance-cell';
                
                var presentClass = 'attendance-btn btn-present';
                var absentClass = 'attendance-btn btn-absent';
                var odClass = 'attendance-btn btn-od';
                
                if (currentStatus === 'present') {
                    presentClass += ' btn-active';
                    absentClass += ' btn-inactive';
                    odClass += ' btn-inactive';
                } else if (currentStatus === 'absent') {
                    presentClass += ' btn-inactive';
                    absentClass += ' btn-active';
                    odClass += ' btn-inactive';
                } else if (currentStatus === 'od') {
                    presentClass += ' btn-inactive';
                    absentClass += ' btn-inactive';
                    odClass += ' btn-active';
                    var odKey = studentId + '_period_' + currentPeriod;
                    odMarkedPerPeriod[odKey] = true;
                } else {
                    presentClass += ' btn-inactive';
                    absentClass += ' btn-inactive';
                    odClass += ' btn-inactive';
                }
                
                cell3.innerHTML = '<button class="' + presentClass + '" data-id="' + studentId + '" data-regno="' + regNo + '" data-status="present">✅ Present</button>' +
                                 '<button class="' + odClass + '" data-id="' + studentId + '" data-regno="' + regNo + '" data-period="' + currentPeriod + '">🎯 OD</button>' +
                                 '<button class="' + absentClass + '" data-id="' + studentId + '" data-regno="' + regNo + '" data-status="absent">❌ Absent</button>';
            }
            
            attachEventListeners();
        }
        
        // Show Student Info Modal for a specific student
        function showStudentInfo(studentId) {
            var modal = document.getElementById('studentInfoModal');
            var body = document.getElementById('studentInfoBody');
            body.innerHTML = '<div class="loading-modal">Loading student information...</div>';
            modal.style.display = 'flex';
            
            fetch('/get_student_full_details/' + studentId)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        renderStudentInfoModal(data);
                    } else {
                        body.innerHTML = '<div class="loading-modal" style="color: red;">Error: ' + data.error + '</div>';
                    }
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    body.innerHTML = '<div class="loading-modal" style="color: red;">Failed to load student information</div>';
                });
        }
        
        // Render Student Info Modal
        function renderStudentInfoModal(data) {
            var student = data.student;
            var attendance = data.attendance;
            var dailyAttendance = data.daily_attendance;
            
            var html = '';
            
            // Student Profile Section
            html += '<div class="student-profile-modal">';
            html += '<h3>' + student.name + ' (' + (student.gender === 'M' ? 'Male' : 'Female') + ')</h3>';
            html += '<p>Register Number: <strong>' + student.register_number + '</strong></p>';
            html += '<div class="info-grid-modal">';
            html += '<div class="info-card-modal"><div class="label">📚 Year & Section</div><div class="value">' + student.year + ' - Section ' + student.section + '</div></div>';
            html += '<div class="info-card-modal"><div class="label">🎓 Batch</div><div class="value">' + (student.batch || 'Not specified') + '</div></div>';
            if (student.dob) html += '<div class="info-card-modal"><div class="label">🎂 Date of Birth</div><div class="value">' + student.dob + '</div></div>';
            if (student.umis) html += '<div class="info-card-modal"><div class="label">🆔 UMIS Number</div><div class="value">' + student.umis + '</div></div>';
            if (student.mobile_student) html += '<div class="info-card-modal"><div class="label">📱 Mobile</div><div class="value">' + student.mobile_student + '</div></div>';
            if (student.mobile_parent) html += '<div class="info-card-modal"><div class="label">📞 Parent Mobile</div><div class="value">' + student.mobile_parent + '</div></div>';
            if (student.parent_guardian_name) html += '<div class="info-card-modal"><div class="label">👪 Parent/Guardian</div><div class="value">' + student.parent_guardian_name + '</div></div>';
            if (student.blood_group) html += '<div class="info-card-modal"><div class="label">🩸 Blood Group</div><div class="value"><span style="background:#dc3545; color:white; padding:2px 8px; border-radius:15px;">' + student.blood_group + '</span></div></div>';
            html += '</div></div>';
            
            // Attendance Statistics
            html += '<div class="stats-modal">';
            html += '<div class="stat-modal"><div class="number">' + attendance.total_days + '</div><div>Total Days</div></div>';
            html += '<div class="stat-modal"><div class="number" style="color:#28a745;">' + attendance.present + '</div><div>Present</div></div>';
            html += '<div class="stat-modal"><div class="number" style="color:#17a2b8;">' + attendance.od + '</div><div>OD</div></div>';
            html += '<div class="stat-modal"><div class="number" style="color:#dc3545;">' + attendance.absent + '</div><div>Absent</div></div>';
            html += '<div class="stat-modal"><div class="number" style="color:#28a745;">' + attendance.percentage + '%</div><div>Percentage</div></div>';
            html += '</div>';
            
            // Daily Attendance Table
            html += '<h4 style="margin: 15px 0 10px;">Daily Attendance Record</h4>';
            html += '<div class="table-wrapper">';
            html += '<table class="attendance-table-modal">';
            html += '<thead><tr><th>Date</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th></tr></thead>';
            html += '<tbody>';
            
            for (var date in dailyAttendance) {
                html += '<tr>';
                html += '<td><strong>' + formatDate(date) + '</strong></td>';
                for (var period = 1; period <= 6; period++) {
                    var record = dailyAttendance[date][period];
                    if (record && record.status === 'present') {
                        if (record.is_od) {
                            html += '<td><span class="od-badge-modal">OD</span><br><small>' + (record.od_activity_name || '') + '</small></td>';
                        } else {
                            html += '<td><span class="present-badge-modal">P</span></td>';
                        }
                    } else {
                        html += '<td><span class="absent-badge-modal">A</span></td>';
                    }
                }
                html += '</tr>';
            }
            
            html += '</tbody></table></div>';
            
            document.getElementById('studentInfoBody').innerHTML = html;
        }
        
        function formatDate(dateStr) {
            var d = new Date(dateStr);
            return d.getDate() + '-' + (d.getMonth() + 1) + '-' + d.getFullYear();
        }
        
        function closeStudentInfoModal() {
            document.getElementById('studentInfoModal').style.display = 'none';
        }
        
        // Render activity types
        function renderActivityTypes() {
            var container = document.getElementById('odActivityList');
            container.innerHTML = '';
            
            for (var i = 0; i < activityTypesData.length; i++) {
                var activity = activityTypesData[i];
                var btn = document.createElement('button');
                btn.className = 'activity-btn';
                btn.setAttribute('data-id', activity.id);
                btn.setAttribute('data-name', activity.name);
                btn.textContent = '🎯 ' + activity.name;
                container.appendChild(btn);
            }
            
            var activityBtns = document.querySelectorAll('.activity-btn');
            for (var i = 0; i < activityBtns.length; i++) {
                activityBtns[i].addEventListener('click', function(e) {
                    var activityId = this.getAttribute('data-id');
                    var activityName = this.getAttribute('data-name');
                    confirmOD(activityId, activityName);
                });
            }
        }
        
        // Update statistics
        function updateStats() {
            var present = 0;
            var btns = document.querySelectorAll('.btn-present');
            for (var i = 0; i < btns.length; i++) {
                if (btns[i].classList.contains('btn-active')) {
                    present++;
                }
            }
            var total = btns.length;
            document.getElementById('presentCount').innerText = present;
            document.getElementById('absentCount').innerText = total - present;
        }
        
        // Mark attendance (Present/Absent)
        function markAttendance(button, studentId, regNo, status) {
            var row = document.getElementById('row-' + studentId);
            var presentBtn = row.querySelector('.btn-present');
            var absentBtn = row.querySelector('.btn-absent');
            var odBtn = row.querySelector('.btn-od');
            
            var odKey = studentId + '_period_' + currentPeriod;
            if (odMarkedPerPeriod[odKey]) {
                delete odMarkedPerPeriod[odKey];
            }
            
            presentBtn.classList.remove('btn-active');
            presentBtn.classList.add('btn-inactive');
            absentBtn.classList.remove('btn-active');
            absentBtn.classList.add('btn-inactive');
            odBtn.classList.remove('btn-active');
            odBtn.classList.add('btn-inactive');
            
            if (status === 'present') {
                presentBtn.classList.remove('btn-inactive');
                presentBtn.classList.add('btn-active');
            } else if (status === 'absent') {
                absentBtn.classList.remove('btn-inactive');
                absentBtn.classList.add('btn-active');
            }
            
            if (!attendanceDict[studentId]) {
                attendanceDict[studentId] = {};
            }
            attendanceDict[studentId][currentPeriod] = status;
            
            fetch('/update_temp_attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: studentId,
                    reg_no: regNo,
                    period: currentPeriod,
                    status: status
                })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    hasChanges = true;
                    updateStats();
                }
            })
            .catch(function(error) { console.error('Error:', error); });
        }
        
        // Open OD modal
        function openODModal(studentId, regNo, period) {
            selectedStudentId = studentId;
            selectedRegNo = regNo;
            selectedPeriod = period;
            document.getElementById('odModal').style.display = 'flex';
        }
        
        // Close OD modal
        function closeODModal() {
            document.getElementById('odModal').style.display = 'none';
            selectedStudentId = null;
            selectedRegNo = null;
            selectedPeriod = null;
        }
        
        // Confirm OD
        function confirmOD(activityId, activityName) {
            if (!selectedStudentId) return;
            
            var periodToMark = selectedPeriod;
            
            var odKey = selectedStudentId + '_period_' + periodToMark;
            
            if (odMarkedPerPeriod[odKey]) {
                alert('⚠️ OD already marked for this student on Period ' + periodToMark + '!');
                closeODModal();
                return;
            }
            
            var row = document.getElementById('row-' + selectedStudentId);
            var presentBtn = row.querySelector('.btn-present');
            var absentBtn = row.querySelector('.btn-absent');
            var odBtn = row.querySelector('.btn-od');
            
            if (odBtn.classList.contains('btn-active')) {
                alert('⚠️ This student is already marked as OD for Period ' + periodToMark + '!');
                closeODModal();
                return;
            }
            
            presentBtn.classList.remove('btn-active');
            presentBtn.classList.add('btn-inactive');
            absentBtn.classList.remove('btn-active');
            absentBtn.classList.add('btn-inactive');
            odBtn.classList.remove('btn-inactive');
            odBtn.classList.add('btn-active');
            
            fetch('/staff_mark_od', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: selectedStudentId,
                    reg_no: selectedRegNo,
                    period: periodToMark,
                    date: currentDate,
                    activity_type_id: activityId,
                    activity_name: activityName
                })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    if (!attendanceDict[selectedStudentId]) {
                        attendanceDict[selectedStudentId] = {};
                    }
                    attendanceDict[selectedStudentId][periodToMark] = 'od';
                    odMarkedPerPeriod[odKey] = true;
                    hasChanges = true;
                    updateStats();
                    closeODModal();
                    alert('✅ OD marked for ' + selectedRegNo + ' - ' + activityName + ' (Period ' + periodToMark + ')');
                } else {
                    odBtn.classList.remove('btn-active');
                    odBtn.classList.add('btn-inactive');
                    alert('Error: ' + data.error);
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                odBtn.classList.remove('btn-active');
                odBtn.classList.add('btn-inactive');
                alert('Failed to mark OD');
            });
        }
        
        // Attach event listeners
        function attachEventListeners() {
            var presentBtns = document.querySelectorAll('.btn-present');
            var absentBtns = document.querySelectorAll('.btn-absent');
            var odBtns = document.querySelectorAll('.btn-od');
            
            for (var i = 0; i < presentBtns.length; i++) {
                presentBtns[i].addEventListener('click', function(e) {
                    var studentId = this.getAttribute('data-id');
                    var regNo = this.getAttribute('data-regno');
                    markAttendance(this, studentId, regNo, 'present');
                });
            }
            
            for (var i = 0; i < absentBtns.length; i++) {
                absentBtns[i].addEventListener('click', function(e) {
                    var studentId = this.getAttribute('data-id');
                    var regNo = this.getAttribute('data-regno');
                    markAttendance(this, studentId, regNo, 'absent');
                });
            }
            
            for (var i = 0; i < odBtns.length; i++) {
                odBtns[i].addEventListener('click', function(e) {
                    var studentId = this.getAttribute('data-id');
                    var regNo = this.getAttribute('data-regno');
                    var period = this.getAttribute('data-period');
                    openODModal(studentId, regNo, period);
                });
            }
        }
        
        // Student Info Button - Show all students list
        document.getElementById('studentInfoBtn').addEventListener('click', function() {
            var modal = document.getElementById('studentInfoModal');
            var body = document.getElementById('studentInfoBody');
            body.innerHTML = '<div class="loading-modal">Loading all students information...</div>';
            modal.style.display = 'flex';
            
            var allStudentsInfo = '<div style="max-height: 70vh; overflow-y: auto;">';
            
            for (var i = 0; i < studentsData.length; i++) {
                var student = studentsData[i];
                allStudentsInfo += '<div style="border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 15px; padding: 15px;">';
                allStudentsInfo += '<h4 style="color: #667eea;">' + student.name + ' (' + student.register_number + ')</h4>';
                allStudentsInfo += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin-top: 10px;">';
                allStudentsInfo += '<div><strong>Year/Section:</strong> ' + student.year + ' - ' + student.section + '</div>';
                allStudentsInfo += '<div><strong>Batch:</strong> ' + (student.batch || 'N/A') + '</div>';
                allStudentsInfo += '<div><strong>Gender:</strong> ' + (student.gender === 'M' ? 'Male' : 'Female') + '</div>';
                allStudentsInfo += '</div>';
                allStudentsInfo += '<button onclick="showStudentInfo(' + student.id + ')" style="margin-top: 10px; background: #17a2b8; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">📋 View Full Details</button>';
                allStudentsInfo += '</div>';
            }
            
            allStudentsInfo += '</div>';
            body.innerHTML = allStudentsInfo;
        });
        
        // BULK PRESENT
        document.getElementById('bulkPresentBtn').addEventListener('click', function() {
            if (confirm('Mark ALL students as PRESENT for Period ' + currentPeriod + '?')) {
                var allPresentBtns = document.querySelectorAll('.btn-present');
                var successCount = 0;
                var totalCount = allPresentBtns.length;
                
                this.disabled = true;
                document.getElementById('bulkAbsentBtn').disabled = true;
                this.textContent = '⏳ Processing...';
                
                function processNext(index) {
                    if (index >= totalCount) {
                        document.getElementById('bulkPresentBtn').disabled = false;
                        document.getElementById('bulkAbsentBtn').disabled = false;
                        document.getElementById('bulkPresentBtn').textContent = '✅ All Present';
                        
                        if (successCount > 0) {
                            hasChanges = true;
                            updateStats();
                            alert('✅ ' + successCount + ' out of ' + totalCount + ' students marked as PRESENT');
                        } else {
                            alert('⚠️ No students were marked. Please try again.');
                        }
                        return;
                    }
                    
                    var btn = allPresentBtns[index];
                    var studentId = btn.getAttribute('data-id');
                    var regNo = btn.getAttribute('data-regno');
                    
                    var row = document.getElementById('row-' + studentId);
                    if (row) {
                        var presentBtn = row.querySelector('.btn-present');
                        var absentBtn = row.querySelector('.btn-absent');
                        var odBtn = row.querySelector('.btn-od');
                        
                        presentBtn.classList.remove('btn-inactive');
                        presentBtn.classList.add('btn-active');
                        absentBtn.classList.remove('btn-active');
                        absentBtn.classList.add('btn-inactive');
                        odBtn.classList.remove('btn-active');
                        odBtn.classList.add('btn-inactive');
                    }
                    
                    if (!attendanceDict[studentId]) {
                        attendanceDict[studentId] = {};
                    }
                    attendanceDict[studentId][currentPeriod] = 'present';
                    
                    var odKey = studentId + '_period_' + currentPeriod;
                    if (odMarkedPerPeriod[odKey]) {
                        delete odMarkedPerPeriod[odKey];
                    }
                    
                    fetch('/update_temp_attendance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            student_id: studentId,
                            reg_no: regNo,
                            period: currentPeriod,
                            status: 'present'
                        })
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.success) {
                            successCount++;
                        }
                        processNext(index + 1);
                    })
                    .catch(function(error) {
                        console.error('Error:', error);
                        processNext(index + 1);
                    });
                }
                
                processNext(0);
            }
        });
        
        // BULK ABSENT
        document.getElementById('bulkAbsentBtn').addEventListener('click', function() {
            if (confirm('Mark ALL students as ABSENT for Period ' + currentPeriod + '?')) {
                var allAbsentBtns = document.querySelectorAll('.btn-absent');
                var successCount = 0;
                var totalCount = allAbsentBtns.length;
                
                this.disabled = true;
                document.getElementById('bulkPresentBtn').disabled = true;
                this.textContent = '⏳ Processing...';
                
                function processNext(index) {
                    if (index >= totalCount) {
                        document.getElementById('bulkAbsentBtn').disabled = false;
                        document.getElementById('bulkPresentBtn').disabled = false;
                        document.getElementById('bulkAbsentBtn').textContent = '❌ All Absent';
                        
                        if (successCount > 0) {
                            hasChanges = true;
                            updateStats();
                            alert('✅ ' + successCount + ' out of ' + totalCount + ' students marked as ABSENT');
                        } else {
                            alert('⚠️ No students were marked. Please try again.');
                        }
                        return;
                    }
                    
                    var btn = allAbsentBtns[index];
                    var studentId = btn.getAttribute('data-id');
                    var regNo = btn.getAttribute('data-regno');
                    
                    var row = document.getElementById('row-' + studentId);
                    if (row) {
                        var presentBtn = row.querySelector('.btn-present');
                        var absentBtn = row.querySelector('.btn-absent');
                        var odBtn = row.querySelector('.btn-od');
                        
                        presentBtn.classList.remove('btn-active');
                        presentBtn.classList.add('btn-inactive');
                        absentBtn.classList.remove('btn-inactive');
                        absentBtn.classList.add('btn-active');
                        odBtn.classList.remove('btn-active');
                        odBtn.classList.add('btn-inactive');
                    }
                    
                    if (!attendanceDict[studentId]) {
                        attendanceDict[studentId] = {};
                    }
                    attendanceDict[studentId][currentPeriod] = 'absent';
                    
                    var odKey = studentId + '_period_' + currentPeriod;
                    if (odMarkedPerPeriod[odKey]) {
                        delete odMarkedPerPeriod[odKey];
                    }
                    
                    fetch('/update_temp_attendance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            student_id: studentId,
                            reg_no: regNo,
                            period: currentPeriod,
                            status: 'absent'
                        })
                    })
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (data.success) {
                            successCount++;
                        }
                        processNext(index + 1);
                    })
                    .catch(function(error) {
                        console.error('Error:', error);
                        processNext(index + 1);
                    });
                }
                
                processNext(0);
            }
        });
        
        // Save and exit
        document.getElementById('saveBtn').addEventListener('click', function() {
            if (isSaving) return;
            
            if (!hasChanges) {
                if (confirm('No changes made. Exit anyway?')) {
                    window.location.href = '/clear_temp_attendance';
                }
                return;
            }
            
            if (confirm('Save all changes and exit?')) {
                isSaving = true;
                window.location.href = '/save_attendance';
            }
        });
        
        // Discard and exit
        document.getElementById('discardBtn').addEventListener('click', function() {
            if (hasChanges && !confirm('Discard all changes and exit?')) {
                return;
            }
            window.location.href = '/clear_temp_attendance';
        });
        
        // Close modals
        document.getElementById('closeModalBtn').addEventListener('click', closeODModal);
        window.addEventListener('click', function(e) {
            if (e.target === document.getElementById('odModal')) {
                closeODModal();
            }
            if (e.target === document.getElementById('studentInfoModal')) {
                closeStudentInfoModal();
            }
        });
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (hasChanges && !confirm('You have unsaved changes! Save before logging out?')) {
                window.location.href = '/logout';
            } else if (hasChanges) {
                document.getElementById('saveBtn').click();
            } else {
                window.location.href = '/logout';
            }
        });
        
        // Before unload warning
        window.addEventListener('beforeunload', function(e) {
            if (hasChanges && !isSaving) {
                e.preventDefault();
                e.returnValue = 'You have unsaved changes!';
                return e.returnValue;
            }
        });
        
        // Initialize
        loadInitialData();
    </script>
</body>
</html>
